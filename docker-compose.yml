services:
  db:
    image: postgres:16-alpine
    container_name: savour-db
    environment:
      POSTGRES_USER: savour
      POSTGRES_PASSWORD: savour
      POSTGRES_DB: savour
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - savour-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U savour -d savour"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: savour-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - savour-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: savour-backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://savour:savour@db:5432/savour?schema=public
      - REDIS_URL=redis://redis:6379/0
      - BACKEND_PORT=${BACKEND_PORT:-3001}
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/backend/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - savour-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${BACKEND_PORT:-3001}/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: savour-frontend
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT:-3001}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/frontend/node_modules
      - /app/apps/frontend/.next
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - savour-network

networks:
  savour-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
